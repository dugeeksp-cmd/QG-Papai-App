<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>QG do Papai - Painel Administrador</title>
  
  <link rel="stylesheet" href="style.css?v=2.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            brawl: ['"Lilita One"', 'cursive', 'sans-serif'],
            sansAlt: ['"Outfit"', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="brawl-stripe-bg p-4 flex flex-col justify-between min-h-screen">

  <!-- Efeitos sonoros reais localizados de forma relativa -->
  <audio id="audio-click" src="sons/menu_click_01.ogg" preload="auto"></audio>
  <audio id="audio-msg" src="sons/new_msg.ogg" preload="auto"></preload>

  <div class="max-w-6xl w-full mx-auto flex flex-col gap-6">

    <!-- BARRA SUPERIOR DE APOIO -->
    <div class="flex justify-between items-center bg-black/60 p-4 border-2 border-black rounded-2xl">
      <div class="flex items-center gap-3">
        <span class="text-3xl">👑</span>
        <span class="font-brawl text-2xl tracking-wide uppercase text-yellow-500 text-shadow">Painel Admin</span>
      </div>
      <a href="index.html" onclick="playClick()" class="brawl-btn-red text-xs px-4 py-2 font-brawl uppercase">
        Voltar Ao Lobby 🚪
      </a>
    </div>

    <!-- TELA CENTRAL COMPONENTIZADA: TEMA PAPAI (Dourado/Preto) -->
    <main class="theme-papai bg-gradient-to-b from-[#1c1c1c] to-[#121212] border-4 border-amber-500 rounded-3xl p-6 shadow-[0_10px_0_rgba(0,0,0,0.5)]">
      
      <!-- Topo: Painel Administrativo de Ações (Salvar Link e Ativar Meet) -->
      <section class="bg-black/50 border-4 border-black rounded-2xl p-5 mb-6">
        <h3 class="text-lg font-brawl text-yellow-400 uppercase mb-4 flex items-center gap-2">
          ⚡ CONTROLE DE COMUNICAÇÃO DE FAMÍLIA
        </h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
          
          <!-- Botão Ação 1: Salvar Link -->
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-300">Link da Sala Familiar (Google Meet etc.):</label>
            <div class="flex gap-2">
              <input type="url" id="meet-input" value="https://meet.google.com/abc-defg-hij" class="bg-slate-900 border-2 border-black rounded-xl p-2 text-white text-sm flex-grow font-mono focus:outline-none focus:border-yellow-400">
              <button onclick="saveMeetLink()" class="brawl-btn-yellow font-brawl text-xs uppercase px-4 py-2 whitespace-nowrap">
                Salvar Link
              </button>
            </div>
          </div>

          <!-- Botão Ação 2: Ativar Meet (Ação Estilo botão "Criar Sala") -->
          <div class="flex flex-col gap-2">
            <span class="text-xs font-bold text-slate-300">Ação Rápida de Transmissão:</span>
            <button id="meet-btn" onclick="toggleActiveMeet()" class="brawl-btn-green w-full font-brawl py-2.5 text-xs text-center uppercase tracking-wider">
              🎮 ATIVAR MEET NO QG
            </button>
          </div>

        </div>
      </section>

      <!-- Centro: Área de Gerenciamento de Usuários (Miguel e Sophia) e Temas por cores -->
      <section class="bg-black/40 border-4 border-black rounded-2xl p-5 mb-6">
        <h3 class="text-lg font-brawl text-cyan-400 uppercase mb-4">
          👥 GERENCIAMENTO DOS GUERREIROS DO CLÃ
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <!-- Bloco Miguel -->
          <div class="bg-slate-950 border-2 border-blue-500/30 rounded-xl p-4 flex flex-col justify-between gap-3 relative">
            <div class="absolute top-2 right-2 bg-blue-600/50 border border-blue-400 font-brawl text-[10px] uppercase px-2 py-0.5 rounded text-white">
              Tema Azul
            </div>
            
            <div class="flex items-center gap-3">
              <span class="text-3xl bg-blue-900/50 p-2 rounded-xl">🦈</span>
              <div>
                <h4 class="text-base font-brawl text-blue-400 uppercase">MIGUEL</h4>
                <p class="text-xs text-slate-400">Seção Ativa - Passcode: <span class="font-bold text-yellow-500">123456</span></p>
              </div>
            </div>

            <div class="border-t border-slate-800 pt-3 flex justify-between items-center">
              <div>
                <span class="text-xs text-slate-400 block mb-1 font-bold">Variáveis de Cores (Miguel):</span>
                <div class="flex items-center gap-1.5">
                  <span class="inline-block w-4 h-4 bg-blue-500 rounded-full border border-black"></span>
                  <span class="inline-block w-4 h-4 bg-orange-500 rounded-full border border-black"></span>
                  <span class="inline-block w-4 h-4 bg-yellow-400 rounded-full border border-black"></span>
                </div>
              </div>
              <a href="miguel.html" onclick="playClick()" class="bg-blue-600 text-white font-brawl text-[10px] uppercase px-3 py-1.5 rounded border-2 border-black hover:bg-blue-500 shadow-[2px_2px_0_#000]">Irp/ Sala 🦈</a>
            </div>
          </div>

          <!-- Bloco Sophia -->
          <div class="bg-slate-950 border-2 border-pink-500/30 rounded-xl p-4 flex flex-col justify-between gap-3 relative">
            <div class="absolute top-2 right-2 bg-pink-600/50 border border-pink-400 font-brawl text-[10px] uppercase px-2 py-0.5 rounded text-white">
              Tema Rosa
            </div>
            
            <div class="flex items-center gap-3">
              <span class="text-3xl bg-pink-900/50 p-2 rounded-xl">🌸</span>
              <div>
                <h4 class="text-base font-brawl text-pink-400 uppercase">SOPHIA</h4>
                <p class="text-xs text-slate-400">Seção Ativa - Passcode: <span class="font-bold text-yellow-500">654321</span></p>
              </div>
            </div>

            <div class="border-t border-slate-800 pt-3 flex justify-between items-center">
              <div>
                <span class="text-xs text-slate-400 block mb-1 font-bold">Variáveis de Cores (Sophia):</span>
                <div class="flex items-center gap-1.5">
                  <span class="inline-block w-4 h-4 bg-pink-500 rounded-full border border-black"></span>
                  <span class="inline-block w-4 h-4 bg-purple-500 rounded-full border border-black"></span>
                  <span class="inline-block w-4 h-4 bg-fuchsia-400 rounded-full border border-black"></span>
                </div>
              </div>
              <a href="sophia.html" onclick="playClick()" class="bg-pink-600 text-white font-brawl text-[10px] uppercase px-3 py-1.5 rounded border-2 border-black hover:bg-pink-500 shadow-[2px_2px_0_#000]">Irp/ Sala 🌸</a>
            </div>
          </div>

        </div>
      </section>

      <!-- Parte Inferior: Chat com abas horizontais de fácil navegação -->
      <section class="mt-6">
        
        <!-- Abas do Chat -->
        <div class="brawl-tab-container select-none">
          <button id="tab-Familia" onclick="switchTab('Familia')" class="brawl-tab active-familia">👪 Família</button>
          <button id="tab-Miguel" onclick="switchTab('Miguel')" class="brawl-tab">🦈 Miguel</button>
          <button id="tab-Sophia" onclick="switchTab('Sophia')" class="brawl-tab">🦄 Sophia</button>
        </div>

        <!-- Conteúdo do Chat Box -->
        <div class="brawl-chat-box relative">
          <div class="bg-black/30 px-3 py-1.5 rounded-xl text-xs text-yellow-300 font-mono flex justify-between items-center">
            <span>Canal Ativo: <strong id="channel-name-title">👪 FAMÍLIA (Todas as frentes integradas)</strong></span>
            <button onclick="clearChatHistory()" class="text-red-400 hover:text-red-300 uppercase text-[9px] font-brawl bg-black/60 px-2 py-0.5 rounded border border-red-500/30">Limpar Histórico</button>
          </div>

          <!-- Feed de Mensagens Simulado -->
          <div class="chat-message-list" id="chat-feed">
            <!-- As mensagens serão introduzidas via JS -->
          </div>

          <!-- BARRA DE ENTRADA DO CHAT / MENUS -->
          <div class="flex flex-col gap-2 border-t-2 border-black pt-4 relative">
            
            <!-- Gaveta de Emojis / Pins flutuante -->
            <div id="emoji-drawer" class="absolute bottom-20 left-0 hidden w-64 p-3 brawl-emoji-drawer flex flex-col gap-2">
              <span class="text-xs uppercase font-brawl text-yellow-400">Pins Disponíveis (Papai):</span>
              <div class="grid grid-cols-4 gap-2">
                <!-- Pins do Papai -->
                <button onclick="sendPin('imagens/emoj_papai/ts_alien_pin.png')" class="hover:scale-110 active:scale-95 transition-transform p-1 bg-black/40 rounded border border-amber-500/30">
                  <img src="imagens/emoj_papai/ts_alien_pin.png" alt="Alien" class="w-10 h-10 object-contain mx-auto">
                </button>
                <button onclick="sendPin('imagens/emoj_papai/pin_toy_story_zurg.png')" class="hover:scale-110 active:scale-95 transition-transform p-1 bg-black/40 rounded border border-amber-500/30">
                  <img src="imagens/emoj_papai/pin_toy_story_zurg.png" alt="Zurg" class="w-10 h-10 object-contain mx-auto">
                </button>
                <!-- Generics -->
                <button onclick="insertEmoji('🔥')" class="text-2xl hover:scale-110 active:scale-95">🔥</button>
                <button onclick="insertEmoji('👍')" class="text-2xl hover:scale-110 active:scale-95">👍</button>
                <button onclick="insertEmoji('👑')" class="text-2xl hover:scale-110 active:scale-95">👑</button>
                <button onclick="insertEmoji('⚔️')" class="text-2xl hover:scale-110 active:scale-95">⚔️</button>
                <button onclick="insertEmoji('💎')" class="text-2xl hover:scale-110 active:scale-95">💎</button>
                <button onclick="insertEmoji('👾')" class="text-2xl hover:scale-110 active:scale-95">👾</button>
              </div>
            </div>

            <div class="flex gap-2">
              <!-- Botão p/ abrir pins -->
              <button onclick="toggleEmojiDrawer()" class="brawl-btn-yellow font-brawl text-2xl uppercase px-4 whitespace-nowrap flex items-center justify-center">
                ☺
              </button>
              
              <input type="text" id="chat-input" placeholder="Escreva uma mensagem de comando..." class="flex-grow bg-slate-900 border-2 border-black rounded-xl p-3 text-white text-sm focus:outline-none focus:border-yellow-400 font-semibold" onkeydown="handleKeyDown(event)">
              
              <button onclick="sendMessage()" class="brawl-btn-yellow font-brawl text-xs uppercase px-6 py-3 whitespace-nowrap">
                Mandar 🚀
              </button>
            </div>
          </div>

        </div>

      </section>

    </main>

  </div>

  <footer class="mt-8 py-4 text-center text-xs text-white/40">
    👑 QG DO PAPAI • Brawl Stars Admin Theme © 2026 • Versão: 2.0
  </footer>

  <script>
    const clickSound = document.getElementById('audio-click');
    const msgSound = document.getElementById('audio-msg');

    let currentChannel = 'Familia'; // 'Familia' | 'Miguel' | 'Sophia'

    function playClick() {
      clickSound.currentTime = 0;
      clickSound.play().catch(err => console.log('Click sound autoplay blocked:', err));
    }

    function playMsg() {
      msgSound.currentTime = 0;
      msgSound.play().catch(err => console.log('Msg sound autoplay blocked:', err));
    }

    // Configurando link do Google Meet de forma persistente
    window.addEventListener('load', () => {
      const savedLink = localStorage.getItem('qg_meet_link');
      if (savedLink) {
        document.getElementById('meet-input').value = savedLink;
      }
      
      const savedMeetActive = localStorage.getItem('qg_meet_active') === 'true';
      const meetBtn = document.getElementById('meet-btn');
      if (savedMeetActive) {
        meetBtn.innerText = "🔴 DESATIVAR MEET NO QG";
        meetBtn.className = "brawl-btn-red w-full font-brawl py-2.5 text-xs text-center uppercase tracking-wider";
      }

      loadChat();
    });

    function saveMeetLink() {
      playClick();
      const link = document.getElementById('meet-input').value;
      localStorage.setItem('qg_meet_link', link);
      
      // Dispara efeito sonoro de notificação indicando que foi salvo
      playMsg();
      alert('Link do Meet Familiar salvo com sucesso! 🛡️🏆');
    }

    function toggleActiveMeet() {
      playClick();
      const meetBtn = document.getElementById('meet-btn');
      const isCurrentlyActive = localStorage.getItem('qg_meet_active') === 'true';
      
      if (isCurrentlyActive) {
        localStorage.setItem('qg_meet_active', 'false');
        meetBtn.innerText = "🎮 ATIVAR MEET NO QG";
        meetBtn.className = "brawl-btn-green w-full font-brawl py-2.5 text-xs text-center uppercase tracking-wider";
      } else {
        localStorage.setItem('qg_meet_active', 'true');
        meetBtn.innerText = "🔴 DESATIVAR MEET NO QG";
        meetBtn.className = "brawl-btn-red w-full font-brawl py-2.5 text-xs text-center uppercase tracking-wider";
        
        // Mensagem automática no feed
        addSystemMessage("Papai (Admin) ativou o Google Meet Familiar! Clique no botão superior das suas telas para entrar na transmissão! 🎥✨");
      }
    }

    // Gerenciador de Chat por Canal
    function switchTab(channelId) {
      playClick();
      currentChannel = channelId;

      const tabs = ['Familia', 'Miguel', 'Sophia'];
      tabs.forEach(tab => {
        const btn = document.getElementById('tab-' + tab);
        btn.className = "brawl-tab";
        if (tab === channelId) {
          if (tab === 'Familia') btn.className = "brawl-tab active-familia";
          else if (tab === 'Miguel') btn.className = "brawl-tab active-miguel";
          else btn.className = "brawl-tab active-sophia";
        }
      });

      // Atualiza o Título do Canal
      const channelTitle = document.getElementById('channel-name-title');
      if (channelId === 'Familia') {
        channelTitle.innerText = "👪 FAMÍLIA (Todas as frentes integradas)";
      } else if (channelId === 'Miguel') {
        channelTitle.innerText = "🦈 CANAL DO MIGUEL (Foco em táticas)";
      } else {
        channelTitle.innerText = "🦄 CANAL DA SOPHIA (Brilho e Missões)";
      }

      loadChat();
    }

    function getChatKey() {
      return 'qg_papai_chat_messages_' + currentChannel;
    }

    function loadChat() {
      const feed = document.getElementById('chat-feed');
      feed.innerHTML = '';
      
      const key = getChatKey();
      const savedMessages = JSON.parse(localStorage.getItem(key)) || getDefaultMessages();
      
      savedMessages.forEach(msg => {
        appendMessageUI(msg);
      });
      scrollToBottom();
    }

    function scrollToBottom() {
      const feed = document.getElementById('chat-feed');
      feed.scrollTop = feed.scrollHeight;
    }

    function getDefaultMessages() {
      if (currentChannel === 'Familia') {
        return [
          {
            id: 1,
            sender: "Papai (Admin)",
            senderRole: "👑 ADMIN",
            avatarFile: "imagens/perfil/bull_portrait.png",
            text: "Sejam bem-vindos ao clã oficial familiar! 🚀 Todas as missões do dia estão de pé!",
            timestamp: "12:00",
            isPin: false
          },
          {
            id: 2,
            sender: "Miguel",
            senderRole: "⚡ JOGADOR",
            avatarFile: "imagens/perfil/fang_portrait.png",
            text: "Estou jogando e terminando de organizar a estante, pai! 🦈",
            timestamp: "12:01",
            isPin: false
          }
        ];
      } else if (currentChannel === 'Miguel') {
        return [
          {
            id: 3,
            sender: "Papai (Admin)",
            senderRole: "👑 ADMIN",
            avatarFile: "imagens/perfil/bull_portrait.png",
            text: "Miguel, foco na lição antes de subir troféus de Fang! ⚔️",
            timestamp: "11:50",
            isPin: false
          }
        ];
      } else {
        return [
          {
            id: 4,
            sender: "Papai (Admin)",
            senderRole: "👑 ADMIN",
            avatarFile: "imagens/perfil/bull_portrait.png",
            text: "Oi minha princesa Sophia! Suas lições estão lindas?",
            timestamp: "11:55",
            isPin: false
          }
        ];
      }
    }

    function appendMessageUI(msg) {
      const feed = document.getElementById('chat-feed');
      const bubble = document.createElement('div');
      
      const isMe = msg.sender.includes("Papai") || msg.sender.includes("Você");
      bubble.className = "msg-bubble " + (isMe ? "sent-by-user" : "received");

      const headerColorClass = isMe ? "text-slate-800" : (msg.sender.includes("Miguel") ? "text-cyan-400" : "text-pink-400");
      
      let bodyHtml = `<p class="text-[10px] ${headerColorClass} font-brawl mb-1 uppercase flex justify-between gap-4">
        <span>${msg.sender} <span class="text-[8px] opacity-75 font-mono">(${msg.senderRole})</span></span>
        <span class="font-mono font-normal opacity-60">${msg.timestamp}</span>
      </p>`;

      if (msg.isPin) {
        bodyHtml += `<img src="${msg.text}" class="w-14 h-14 object-contain my-1 animate-bounce" onerror="this.src='imagens/emoj_papai/ts_alien_pin.png'">`;
      } else {
        bodyHtml += `<span>${msg.text}</span>`;
      }

      bubble.innerHTML = bodyHtml;
      feed.appendChild(bubble);
    }

    function handleKeyDown(event) {
      if (key === 'Enter' || event.keyCode === 13) {
        sendMessage();
      }
    }

    function toggleEmojiDrawer() {
      playClick();
      const drawer = document.getElementById('emoji-drawer');
      drawer.classList.toggle('hidden');
    }

    function insertEmoji(emoj) {
      playClick();
      const input = document.getElementById('chat-input');
      input.value += emoj;
      document.getElementById('emoji-drawer').classList.add('hidden');
      input.focus();
    }

    function sendPin(pinPath) {
      playClick();
      document.getElementById('emoji-drawer').classList.add('hidden');

      const now = new Date();
      const timestampStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

      const newMsg = {
        id: Date.now(),
        sender: "Papai (Admin)",
        senderRole: "👑 ADMIN",
        avatarFile: "imagens/perfil/bull_portrait.png",
        text: pinPath,
        timestamp: timestampStr,
        isPin: true
      };

      saveMessageToLocal(newMsg);
      appendMessageUI(newMsg);
      scrollToBottom();
      playMsg();

      // Desencadeia simulação de resposta
      simulateResponse();
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      playClick();
      
      const now = new Date();
      const timestampStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

      const newMsg = {
        id: Date.now(),
        sender: "Papai (Admin)",
        senderRole: "👑 ADMIN",
        avatarFile: "imagens/perfil/bull_portrait.png",
        text: text,
        timestamp: timestampStr,
        isPin: false
      };

      saveMessageToLocal(newMsg);
      appendMessageUI(newMsg);
      scrollToBottom();

      input.value = '';
      input.focus();
      playMsg();

      // Desencadeia simulação de resposta
      simulateResponse();
    }

    function addSystemMessage(text) {
      const now = new Date();
      const timestampStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

      const newMsg = {
        id: Date.now(),
        sender: "Papai (Admin)",
        senderRole: "👑 ADMIN",
        avatarFile: "imagens/perfil/bull_portrait.png",
        text: text,
        timestamp: timestampStr,
        isPin: false
      };

      saveMessageToLocal(newMsg);
      appendMessageUI(newMsg);
      scrollToBottom();
      playMsg();
    }

    function saveMessageToLocal(msg) {
      const key = getChatKey();
      const msgs = JSON.parse(localStorage.getItem(key)) || getDefaultMessages();
      msgs.push(msg);
      localStorage.setItem(key, JSON.stringify(msgs));
    }

    function clearChatHistory() {
      playClick();
      if (confirm("Quer mesmo limpar o histórico desse canal?")) {
        const key = getChatKey();
        localStorage.removeItem(key);
        loadChat();
        playMsg();
      }
    }

    // Resposta Simulada dos filhos dependendo de qual canal está ativo
    function simulateResponse() {
      setTimeout(() => {
        const now = new Date();
        const timestampStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

        let responderName = "Miguel";
        let responderRole = "⚡ JOGADOR";
        let avatar = "imagens/perfil/fang_portrait.png";
        let responseTxt = "Entendido, Papai! Estou ligado! 👀⚔️";
        let isPin = false;

        if (currentChannel === 'Familia') {
          // Resposta randômica de algum dos dois
          const rand = Math.random() > 0.5;
          if (rand) {
            responderName = "Miguel";
            responderRole = "⚡ JOGADOR";
            avatar = "imagens/perfil/fang_portrait.png";
            responseTxt = "imagens/emoj_miguel/fang_happy_pin.png";
            isPin = true;
          } else {
            responderName = "Sophia";
            responderRole = "🦄 JOGADORA";
            avatar = "imagens/perfil/penny_portrait.png";
            responseTxt = "Sim, papai! Tudo pronto para brilhar no QG! 🌸✨";
          }
        } else if (currentChannel === 'Miguel') {
          responderName = "Miguel";
          responderRole = "⚡ JOGADOR";
          avatar = "imagens/perfil/fang_portrait.png";
          responseTxt = "Entendido, Papai! Missão dada é missão cumprida! Vou arrumar a estante agora. 🏆";
        } else {
          responderName = "Sophia";
          responderRole = "🦄 JOGADORA";
          avatar = "imagens/perfil/penny_portrait.png";
          responseTxt = "Sim, Papai! Já terminei tudo e fiz com carinho! 🦄🍬 Posso ganhar troféus?";
        }

        const incomingMsg = {
          id: Date.now(),
          sender: responderName,
          senderRole: responderRole,
          avatarFile: avatar,
          text: responseTxt,
          timestamp: timestampStr,
          isPin: isPin
        };

        saveMessageToLocal(incomingMsg);
        
        // Renderiza apenas se ainda estiver no mesmo canal
        if (getChatKey() === 'qg_papai_chat_messages_' + currentChannel) {
          appendMessageUI(incomingMsg);
          scrollToBottom();
        }

        playMsg();
      }, 3000);
    }
  </script>

</body>
</html>
